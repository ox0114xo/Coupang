<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupang 價格雷達 | 專業歷史價格追蹤</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; }
        .glass-morphism { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .gradient-text { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="sticky top-0 z-50 glass-morphism border-b border-slate-200">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg shadow-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <span class="text-2xl font-extrabold tracking-tight gradient-text">Coupang 雷達</span>
            </div>
            <div id="sync-status" class="text-xs font-semibold text-slate-500 bg-slate-100 px-3 py-1 rounded-full">
                同步狀態：已連接雲端
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="text-center mb-16">
            <h1 class="text-5xl font-extrabold text-slate-900 mb-6 leading-tight">掌握價格波動，<br>做最聰明的採買。</h1>
            <div class="relative max-w-2xl mx-auto">
                <input type="text" id="searchInput" 
                    class="w-full px-8 py-5 rounded-2xl border-0 shadow-2xl text-lg ring-1 ring-slate-200 focus:ring-4 focus:ring-blue-500/20 transition-all outline-none" 
                    placeholder="搜尋商品名稱... (例如: 寶利威爾 或 行動電源)">
                <div id="searchLoading" class="hidden absolute right-6 top-6">
                    <div class="loading-spinner"></div>
                </div>
            </div>
            <p class="mt-4 text-slate-500 text-sm">數據每 24 小時自動更新，來自 GitHub 線上資料庫</p>
        </div>

        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>

        <div id="emptyState" class="text-center py-20">
            <div class="text-slate-300 mb-4">
                <svg class="w-20 h-20 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-slate-400">輸入關鍵字開始搜尋歷史價格</h3>
        </div>
    </main>

    <div id="detailModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
            <div class="px-8 py-6 flex justify-between items-start border-b">
                <div>
                    <h2 id="modalTitle" class="text-xl font-bold text-slate-900 leading-tight">商品名稱</h2>
                    <p id="modalCategory" class="text-sm text-blue-600 font-semibold mt-1">分類</p>
                </div>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                    <svg class="w-6 h-6 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-8">
                <div class="flex items-end gap-3 mb-6">
                    <span id="modalCurrentPrice" class="text-4xl font-black text-slate-900">$0</span>
                    <span class="text-slate-500 pb-1 italic">最新價格</span>
                </div>
                <div class="chart-container bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <canvas id="priceChart"></canvas>
                </div>
                <div class="mt-8 flex gap-4">
                    <a id="modalBuyLink" href="#" target="_blank" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl text-center shadow-lg shadow-blue-500/30 transition-all">前往 Coupang 購買</a>
                    <button onclick="closeModal()" class="px-8 py-4 text-slate-500 font-bold hover:bg-slate-50 rounded-xl transition-colors">關閉視窗</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            owner: 'ox0114xo',
            repo: 'Coupang',
            branch: 'main'
        };

        let priceChart = null;
        let globalIndex = []; // 存儲搜尋索引

        // 核心：掃描 GitHub 取得資料清單
        async function fetchGithubData() {
            try {
                // 1. 取得 data 目錄下的分類
                const resp = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/data`);
                const categories = await resp.json();
                
                let allFiles = [];
                for (let cat of categories) {
                    if (cat.type === 'dir') {
                        const fileResp = await fetch(cat.url);
                        const files = await fileResp.json();
                        allFiles = allFiles.concat(files.map(f => ({ catName: cat.name, ...f })));
                    }
                }
                return allFiles;
            } catch (e) {
                console.error("無法連接 GitHub", e);
                return [];
            }
        }

        // 搜尋邏輯
        async function runSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (query.length < 2) return;

            document.getElementById('searchLoading').classList.remove('hidden');
            document.getElementById('emptyState').classList.add('hidden');
            
            const files = await fetchGithubData();
            // 為了效能，我們只讀取每個分類最新的 5 個檔案來建立索引
            const searchPool = files.slice(-30); 
            
            let searchResults = new Map();

            for (let file of searchPool) {
                const csvData = await fetch(file.download_url).then(r => r.text());
                const parsed = Papa.parse(csvData, { header: true }).data;
                
                parsed.forEach(item => {
                    if (item.商品名稱 && item.商品名稱.includes(query)) {
                        const key = item.商品網址;
                        if (!searchResults.has(key)) {
                            searchResults.set(key, { ...item, history: [] });
                        }
                        searchResults.get(key).history.push({ date: item.紀錄時間, price: parseInt(item.價格) });
                    }
                });
            }

            renderResults(Array.from(searchResults.values()));
            document.getElementById('searchLoading').classList.add('hidden');
        }

        function renderResults(data) {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = "";
            
            if (data.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = "product-card bg-white p-6 rounded-3xl transition-all cursor-pointer border border-slate-100";
                card.onclick = () => showDetail(item);
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] uppercase tracking-widest font-extrabold text-blue-600 bg-blue-50 px-2 py-1 rounded-md">${item.分類}</span>
                        <span class="text-xs text-slate-400 font-medium">${item.紀錄時間}</span>
                    </div>
                    <h3 class="text-slate-800 font-bold leading-snug h-12 overflow-hidden mb-4">${item.商品名稱}</h3>
                    <div class="flex justify-between items-center mt-auto">
                        <div class="text-2xl font-black text-slate-900">$${item.價格}</div>
                        <div class="text-blue-500">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function showDetail(item) {
            document.getElementById('modalTitle').innerText = item.商品名稱;
            document.getElementById('modalCategory').innerText = item.分類;
            document.getElementById('modalCurrentPrice').innerText = `$${item.價格}`;
            document.getElementById('modalBuyLink').href = item.商品網址;
            document.getElementById('detailModal').classList.remove('hidden');

            // 排序歷史數據繪製圖表
            const history = item.history.sort((a,b) => new Date(a.date) - new Date(b.date));
            const ctx = document.getElementById('priceChart').getContext('2d');
            
            if (priceChart) priceChart.destroy();
            
            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.map(h => h.date),
                    datasets: [{
                        label: '歷史價格趨勢',
                        data: history.map(h => h.price),
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        borderWidth: 4,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: '#fff',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: false, grid: { display: false } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') runSearch();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupang Radar | 數據儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.0/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f1f5f9; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .stat-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid rgba(255,255,255,0.05); }
        .search-glow:focus-within { box-shadow: 0 0 25px -5px rgba(59, 130, 246, 0.5); border-color: #3b82f6; }
    </style>
</head>
<body class="min-h-screen">

    <div class="flex flex-col lg:flex-row min-h-screen">
        
        <aside class="w-full lg:w-80 p-8 glass flex flex-col justify-between">
            <div>
                <div class="flex items-center gap-3 mb-10">
                    <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-600/20">
                        <i data-lucide="radar" class="w-6 h-6 text-white"></i>
                    </div>
                    <h1 class="text-2xl font-extrabold tracking-tighter">CP <span class="text-blue-500">RADAR</span></h1>
                </div>

                <div class="space-y-4">
                    <div class="stat-card p-6 rounded-2xl">
                        <p class="text-slate-400 text-xs font-bold uppercase mb-1">已捕獲商品</p>
                        <h2 id="count-items" class="text-3xl font-black">0</h2>
                    </div>
                    <div class="stat-card p-6 rounded-2xl">
                        <p class="text-slate-400 text-xs font-bold uppercase mb-1">涵蓋分類</p>
                        <h2 id="count-cats" class="text-3xl font-black text-blue-500">0</h2>
                    </div>
                </div>
            </div>

            <div class="mt-10 p-4 rounded-xl bg-blue-500/10 border border-blue-500/20 text-blue-400 text-xs font-bold">
                <i data-lucide="info" class="w-4 h-4 inline mr-1"></i>
                點擊商品即可啟動「價格雷達」深度分析
            </div>
        </aside>

        <main class="flex-1 p-6 lg:p-12 overflow-y-auto">
            
            <div class="max-w-4xl mb-12">
                <div class="search-glow glass rounded-3xl p-2 flex items-center transition-all">
                    <div class="p-4 text-slate-500">
                        <i data-lucide="search"></i>
                    </div>
                    <input type="text" id="searchInput" 
                           class="w-full bg-transparent border-none outline-none py-4 text-lg font-medium placeholder-slate-600"
                           placeholder="輸入品牌或關鍵字開始挖掘... (如: 小米, POLYWELL)">
                </div>
            </div>

            <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>

            <div id="welcomeScreen" class="flex flex-col items-center justify-center py-32 text-center">
                <div class="w-24 h-24 bg-slate-800 rounded-full flex items-center justify-center mb-6">
                    <i data-lucide="layout-dashboard" class="w-10 h-10 text-slate-500"></i>
                </div>
                <h3 class="text-2xl font-bold text-slate-400 mb-2">雷達掃描中...</h3>
                <p class="text-slate-600 max-w-sm">系統正在從 GitHub 讀取您辛苦收割的 25 個分類大數據。請在上方輸入框進行搜尋。</p>
            </div>
        </main>
    </div>

    <div id="chartModal" class="hidden fixed inset-0 z-[100] bg-slate-950/90 backdrop-blur-xl flex items-center justify-center p-4">
        <div class="glass w-full max-w-4xl rounded-[2.5rem] p-8 md:p-12 relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 p-2 rounded-full hover:bg-white/5 transition-all">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            <div class="mb-8">
                <span id="mCat" class="text-blue-500 text-[10px] font-black tracking-widest uppercase">Category</span>
                <h3 id="mTitle" class="text-2xl font-black mt-2">商品名稱</h3>
            </div>
            <div class="h-64 md:h-80">
                <canvas id="priceChart"></canvas>
            </div>
            <div class="grid grid-cols-3 gap-6 mt-10 border-t border-white/5 pt-10">
                <div class="text-center">
                    <p class="text-slate-500 text-[10px] font-bold uppercase mb-1 tracking-widest">當前價格</p>
                    <p id="mPrice" class="text-3xl font-black text-white">$0</p>
                </div>
                <div class="text-center">
                    <p class="text-slate-500 text-[10px] font-bold uppercase mb-1 tracking-widest">歷史最低</p>
                    <p id="mLow" class="text-3xl font-black text-green-400">$0</p>
                </div>
                <div class="text-center">
                    <p class="text-slate-500 text-[10px] font-bold uppercase mb-1 tracking-widest">歷史最高</p>
                    <p id="mHigh" class="text-3xl font-black text-red-500">$0</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const OWNER = 'ox0114xo';
        const REPO = 'Coupang';
        let store = [];
        let chartInstance = null;

        async function init() {
            lucide.createIcons();
            try {
                const resp = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/data`);
                const cats = await resp.json();
                document.getElementById('count-cats').innerText = cats.filter(c => c.type === 'dir').length;

                for (let cat of cats) {
                    if (cat.type !== 'dir') continue;
                    const fileResp = await fetch(cat.url);
                    const files = (await fileResp.json()).slice(-10); // 讀取最新 10 份 CSV
                    
                    for (let file of files) {
                        const csvText = await (await fetch(file.download_url)).text();
                        Papa.parse(csvText, {
                            header: true,
                            complete: (res) => {
                                res.data.forEach(item => {
                                    if (!item.商品網址 || item.價格 < 30) return; // 自動清洗髒數據
                                    if (item.商品名稱.includes("免運") || item.商品名稱.length < 5) return; // 清洗廣告標籤

                                    let match = store.find(s => s.url === item.商品網址);
                                    if (match) {
                                        match.history.push({ date: item.紀錄時間, price: parseInt(item.價格) });
                                    } else {
                                        store.push({
                                            name: item.商品名稱,
                                            cat: item.分類,
                                            url: item.商品網址,
                                            history: [{ date: item.紀錄時間, price: parseInt(item.價格) }]
                                        });
                                    }
                                });
                                document.getElementById('count-items').innerText = store.length;
                            }
                        });
                    }
                }
            } catch(e) { console.error("數據加載失敗"); }
        }

        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('resultsGrid');
            const welcome = document.getElementById('welcomeScreen');

            if (query.length < 2) { grid.innerHTML = ""; welcome.classList.remove('hidden'); return; }
            welcome.classList.add('hidden');

            const results = store.filter(i => i.name.toLowerCase().includes(query) || i.cat.includes(query)).slice(0, 20);
            grid.innerHTML = results.map(i => {
                const latestPrice = i.history[i.history.length - 1].price;
                return `
                <div class="glass p-6 rounded-3xl hover:border-blue-500 transition-all cursor-pointer flex justify-between items-center group" 
                     onclick='openModal(${JSON.stringify(i).replace(/'/g, "&apos;")})'>
                    <div class="flex-1 pr-4">
                        <span class="text-[9px] font-black text-blue-500 uppercase tracking-tighter">${i.cat}</span>
                        <h3 class="font-bold text-sm line-clamp-1 mt-1 group-hover:text-blue-400 transition-colors">${i.name}</h3>
                        <p class="text-2xl font-black mt-2">$${latestPrice}</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center group-hover:bg-blue-600 transition-all">
                        <i data-lucide="trending-up" class="w-5 h-5"></i>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function openModal(item) {
            document.getElementById('mTitle').innerText = item.name;
            document.getElementById('mCat').innerText = item.cat;
            const history = item.history.sort((a,b) => new Date(a.date) - new Date(b.date));
            const prices = history.map(h => h.price);
            
            document.getElementById('mPrice').innerText = `$${prices[prices.length-1]}`;
            document.getElementById('mLow').innerText = `$${Math.min(...prices)}`;
            document.getElementById('mHigh').innerText = `$${Math.max(...prices)}`;
            
            document.getElementById('chartModal').classList.remove('hidden');
            renderChart(history);
            lucide.createIcons();
        }

        function renderChart(history) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.map(h => h.date),
                    datasets: [{
                        data: history.map(h => h.price),
                        borderColor: '#3b82f6',
                        borderWidth: 5,
                        pointRadius: 0,
                        pointHoverRadius: 10,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: (c) => {
                            const g = c.chart.ctx.createLinearGradient(0,0,0,400);
                            g.addColorStop(0, 'rgba(59, 130, 246, 0.3)');
                            g.addColorStop(1, 'rgba(59, 130, 246, 0)');
                            return g;
                        }
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { display: false }, 
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } } 
                    }
                }
            });
        }

        function closeModal() { document.getElementById('chartModal').classList.add('hidden'); }
        document.getElementById('searchInput').addEventListener('input', performSearch);
        init();
    </script>
</body>
</html>
